syntax = "proto3";
option csharp_namespace = "Shared.Protos";
package product;

service ProductGrpcService {
  rpc GetProductInfo (ProductRequest) returns (ProductResponse);
}

message ProductRequest {
  string product_id = 1;
}

message ProductResponse {
  string product_id = 1;
  string name = 2;
  decimal price = 3;
}
