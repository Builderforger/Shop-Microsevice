services:
  db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=goodadmin
    ports:
      - "5050:80"
  redis:
    image: redis:latest
    container_name: redis_cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  auth:
    build:
      context: .
      dockerfile: back/AuthService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      - ConnectionStrings__DefaultConnection=Host=db;Database=api10_db;Username=myuser;Password=mypassword
      - JwtSettings__Secret=Talbansky_Patron_2008_Tarantino_Bibob_Malbsmd7?
      - JwtSettings__Issuer=AuthService
      - JwtSettings__Audience=MyWebProject
    ports:
      - "5001:8080"
      - "50051:8081" 
    depends_on:
      - db
  catalog:
    build:
      context: .
      dockerfile: back/CatalogService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      - Kestrel__Endpoints__Grpc__Url=http://+:8081
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - ConnectionStrings__DefaultConnection=Host=db;Database=shop_api_db;Username=myuser;Password=mypassword
      - JwtSettings__Secret=Talbansky_Patron_2008_Tarantino_Bibob_Malbsmd7?
      - JwtSettings__Issuer=AuthService
      - JwtSettings__Audience=MyWebProject
    ports:
      - "5002:8080"
      - "50052:8081"
    depends_on:
      - db
  cartapi:
    build:
      context: .
      dockerfile: back/CartApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      - Kestrel__Endpoints__Grpc__Url=http://+:8081
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=Talbansky_Patron_2008_Tarantino_Bibob_Malbsmd7?
      - JwtSettings__Issuer=AuthService
      - JwtSettings__Audience=MyWebProject
    ports:
      - "5003:8080"
    depends_on:
      - redis
      - auth
  getway:
    build:
      context: .
      dockerfile: YarpApiGatewayProject/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      - JwtSettings__Secret=Talbansky_Patron_2008_Tarantino_Bibob_Malbsmd7?
      - JwtSettings__Issuer=AuthService
      - JwtSettings__Audience=MyWebProject
      - AuthServiceUrl=http://auth:8080
      - CatalogServiceUrl=http://catalog:8080
      - CartApiUrl=http://cartapi:8080
      - AuthServiceGrpcUrl=http://auth:8081
      - CatalogServiceGrpcUrl=http://catalog:8081
    ports:
      - "5000:8080"
      - "50050:8081"
    depends_on:
      - auth
      - catalog
      - cartapi
volumes:
  redis_data:

