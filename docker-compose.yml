version: '3.8'
services:
  db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=api10_db
    ports:
      - "5432:5432"
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
  api10:
    build:
      context: .
      dockerfile: back/ApiNumber10/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=api10_db;Username=myuser;Password=mypassword
    ports:
      - "5001:8080"
    depends_on:
      - db
  shopapi:
    build:
      context: .
      dockerfile: back/ShopApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=api10_db;Username=myuser;Password=mypassword
    ports:
      - "5002:8080"
    depends_on:
      - db

